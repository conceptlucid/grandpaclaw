name: Build GrandpaClaw Mac App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
        type: string

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build macOS app
        run: |
          cd apps/macos
          xcodebuild -scheme GrandpaClaw -configuration Release -destination "platform=macOS" -derivedDataPath build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO 2>&1 | tail -50

      - name: Find built app
        run: |
          find apps/macos/build -name "GrandpaClaw.app" -type d

      - name: Package app
        run: |
          cd apps/macos/build
          APP_PATH=$(find . -name "GrandpaClaw.app" -type d | head -1)
          echo "App path: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "GrandpaClaw-${{ inputs.version }}.zip" "$(basename "$APP_PATH")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrandpaClaw-mac-${{ inputs.version }}
          path: apps/macos/build/**/*.zip
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          release_name: GrandpaClaw v${{ inputs.version }}
          artifact_path: apps/macos/build/**/*.zip
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
